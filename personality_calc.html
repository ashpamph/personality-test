<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashley's Things | Personality Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<header>
    <nav>
        <div class="nav-bar">
            <a href="index.html">
                <img src="media/smiley_icon.png" alt="smiley face icon" width="200px" height="200px" class="logo">
                <h1>Ashley's Things</h1>
            </a>
            <a href="index.html">Home</a>
            <a href="personality_calc.html">Personality Calculator</a>
        </div>
    </nav>
</header>
<body>
    <div class="page">
        <div class="card">
            <div class="card-header">
                <h1>Personality Calculator</h1>
                <p>Let me judge your personality!</p>
            </div>

            <div class="card">
                <h2>Multiple Choice Questions</h2>
                <p>Choose the option that comes to you first, don't think too hard about it!</p>

                <div class="form-group">
                    <label class="question-box">
                        <img src="media/watching_movie.png" class="context-img">
                        You are sat at home on a Sunday evening, watching a movie, when your friend calls you unexpectedly and asks if you want to go out!
                        <span class="helper">How do you respond?</span>
                    </label>
                    <div class="radio-group">
                        <label class="option-box">
                            <input type="radio" name="q1" value="minus1" />
                            <span>While it sounds fun, you'd rather finish your movie and spend the rest of the night relaxing. Maybe next time!</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q1" value="plus2" />
                            <span>You weren't home in the first place. In fact, you're the one calling your friends to come out, already on route to pick them all up.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q1" value="plus0" />
                            <span>If you weren't already ready for bed, you would've considered it. You reply back "You should've let me know earlier!" and make plans for next weekend.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q1" value="minus2" />
                            <span>Definitely not. You already spend enough time around other people during the week. You send a polite rejection and go back to watching your show.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q1" value="plus1" />
                            <span>Hell yeah. You pause your movie for another time and start getting ready, messaging your ETA in one hand and digging for your keys in another.</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="question-box">
                        <img src="media/cinema_view.png" class="context-img">
                        Next weekend, you and your friends go to watch a movie. When you get to the venue, there's only a couple seats left: a tight-knit space at the top, where you'd be separated by talkative fans of the franchise, or seats at the bottom for you to sit together. Quieter, but with limited vision of the film.
                        <span class="helper">What do you pick?</span>
                    </label>
                    <div class="radio-group">
                        <label class="option-box">
                            <input type="radio" name="q2" value="minus1" />
                            <span>You contemplate still watching the movie, but end up choosing the lower seats. You hate chatter during movies, you just want to watch the movie in peace and relax. You also <i>really</i> don't wanna sit with strangers.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q2" value="plus2" />
                            <span>Immediately picking the top seats. You don't mind the chatter - in fact, you start chatting with the strangers sat next to you. By the time you leave the theatre, you've watched the movie, learned a ton of new knowledge, and gained 5 new followers on insta!</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q2" value="plus0" />
                            <span>You're not really bothered, but you'd choose the bottom ones. You don't care about limited vision, you just like sitting with your close friends and watching a good movie.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q2" value="minus2" />
                            <span>They're all terrible options. You pick another movie with barely any reservations and watch in silence. Actually, you decide to just go home and pirate it. So much more relaxing.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q2" value="plus1" />
                            <span>While the chatter might be annoying, the energy is kind of infectious, and you decide to sit on the top seats for the view. You end up having a great time, and you and the people around you scream at the ending together.</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="question-box">
                    <img src="media/giving_presentation.png" class="context-img">
                        For one of your assignments, you have to do a powerpoint presenting your work. You can choose to either do it by yourself, you could beg your teacher to put you and your friends in the same group, or you could just join a random group.
                        <span class="helper">What are you choosing?</span>
                    </label>
                    <div class="radio-group">
                        <label class="option-box">
                            <input type="radio" name="q3" value="minus1" />
                            <span>You don't want to be in a group with strangers, so you bribe your teacher to let you group with your friends. While you don't really want to do any speaking at all, you don't mind doing little bits, but mainly focus on the research than the sales pitch.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q3" value="plus2" />
                            <span>Hell yeah. Who cares what group you're in - you could even be by yourself and still deliver the most amazing speech of all time. You're a people's person, so you join a group that seem to have the most energy and get to work. You deliver the presentation by yourself and get a standing ovation.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q3" value="plus0" />
                            <span>It doesn't matter to you. You'd prefer to be with your friends, but either option is fine. You contribute fairly to both the research and speaking parts of the presentation.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q3" value="minus2" />
                            <span>Immediately picking to work either with friends or just by yourself. Public speaking is something you <i>HATE</i> doing, and you'll do anything to avoid it. Whether that's begging your teacher to let you do it privately or handing over all speaking parts to your friends.</span>
                        </label>
                        <label class="option-box">
                            <input type="radio" name="q3" value="plus1" />
                            <span>You choose to join a random group! They seem to know what they're doing, and you know that you can deliver a pretty good presentation alongside the others. You're praised afterwards for your teamwork on the project.</span>
                        </label>
                    </div>
                </div>

                <div class="button-row">
                    <button class="btn-primary" id="calculate_btn">Calculate My Personality</button>
                    <button class="btn-secondary" id="reset_btn" type="button">Reset</button>
                </div>
            </div>

            <div class="card results-card">
                <h2>Results</h2>

                <div id="resultsContent">

                    <div class="result-main" id="total_result">You are an: __</div>
                    <div id="rating_badge" class="rating-badge">Scoring: __</div>

                    <div class="result-breakdown">
                        <ul class="results-list" id="results_list"></ul>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
